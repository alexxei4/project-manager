version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: project_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_manager
      POSTGRES_USER: project_user
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - project-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: project_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - project-network

  # PHP-FPM with Laravel
  php:
    build:
      context: ./docker/php  # This is correct - relative path from compose file
      dockerfile: Dockerfile
    container_name: project_php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
    networks:
      - project-network

  # PgAdmin (optional)
  pgadmin:
    image: dpage/pgadmin4
    container_name: project_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@project.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - project-network

volumes:
  postgres_data:

networks:
  project-network:
    driver: bridge